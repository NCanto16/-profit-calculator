<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="render.css" />
    <script type="module" src="render.js" defer></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div class=""><p class="title">Calculadora de Lucros</p></div>
      <div class="divLinks">
        <a class="links" href="https://www.cssbuy.com/#">CssBuy</a>
        <a
          class="links"
          href="https://docs.google.com/spreadsheets/d/15Wm4Ov0pvu1q4cmyYj8DeKKiOtCqq8iq7fl3MA6PJ1I/edit?gid=0#gid=0"
          >Planilha Peças</a
        >
      </div>
    </header>

    <main>
      <div class="row justify-content-center gap-5 gx-0">
        <div class="col-6 divDados">
          <div class="inputsTitleDiv">
            <h1 class="inputsTitle">Dados do Produto</h1>
            <p class="inputsSubTitle">
              Preencha os dados do produto para realizar o calulo de valor de
              venda ideal.
            </p>
          </div>

          <form class="row g-4 ms-1 me-1">
            <div class="col-12 px-4">
              <label for="nome" class="form-label mb-2 input"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-package-icon lucide-package"
                >
                  <path
                    d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"
                  />
                  <path d="M12 22V12" />
                  <polyline points="3.29 7 12 12 20.71 7" />
                  <path d="m7.5 4.27 9 5.15" />
                </svg>
                Nome do Produto</label
              >
              <input
                type="text"
                class="form-control input"
                id="nome"
                placeholder="Ex: Calça de Moletom"
              />
            </div>

            <div class="inputsLineDiv">
              <div class="inputsLine"></div>
            </div>

            <div class="col-md-6 px-4">
              <label for="preco" class="form-label mb-2 textPc">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-japanese-yen-icon lucide-japanese-yen"
                >
                  <path d="M12 9.5V21m0-11.5L6 3m6 6.5L18 3" />
                  <path d="M6 15h12" />
                  <path d="M6 11h12" />
                </svg>
                Preço do Produto (CN¥)</label
              >
              <label for="preco" class="form-label mb-2 textNote">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-japanese-yen-icon lucide-japanese-yen"
                >
                  <path d="M12 9.5V21m0-11.5L6 3m6 6.5L18 3" />
                  <path d="M6 15h12" />
                  <path d="M6 11h12" />
                </svg>
                Preço da Peça (CN¥)</label
              >
              <input
                type="number"
                class="form-control"
                id="preco"
                placeholder="0,00"
              />
            </div>
            <div class="col-md-6 px-4">
              <label for="peso" class="form-label mb-2">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-weight-icon lucide-weight"
                >
                  <circle cx="12" cy="5" r="3" />
                  <path
                    d="M6.5 8a2 2 0 0 0-1.905 1.46L2.1 18.5A2 2 0 0 0 4 21h16a2 2 0 0 0 1.925-2.54L19.4 9.5A2 2 0 0 0 17.48 8Z"
                  />
                </svg>
                Peso do Produto (g)</label
              >
              <input
                type="number"
                class="form-control"
                id="peso"
                placeholder="0,00"
              />
            </div>
            <div class="col-md-6 px-4">
              <label for="taxa" class="form-label mb-2 textPc">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-file-xcorner-icon lucide-file-x-corner"
                >
                  <path
                    d="M11 22H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 20 8v5"
                  />
                  <path d="M14 2v5a1 1 0 0 0 1 1h5" />
                  <path d="m15 17 5 5" />
                  <path d="m20 17-5 5" />
                </svg>
                Taxa de importação ($)</label
              >
              <label for="taxa" class="form-label textNote">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-file-xcorner-icon lucide-file-x-corner"
                >
                  <path
                    d="M11 22H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 20 8v5"
                  />
                  <path d="M14 2v5a1 1 0 0 0 1 1h5" />
                  <path d="m15 17 5 5" />
                  <path d="m20 17-5 5" />
                </svg>
                Taxa de import. ($)</label
              >
              <input
                type="number"
                class="form-control"
                id="taxa"
                placeholder="0,00"
              />
            </div>
            <div class="col-md-6 px-4">
              <label for="lucro" class="form-label mb-2">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-chart-line-icon lucide-chart-line"
                >
                  <path d="M3 3v16a2 2 0 0 0 2 2h16" />
                  <path d="m19 9-5 5-4-4-3 3" />
                </svg>
                Lucro Esperado (R$)</label
              >
              <input
                type="number"
                class="form-control"
                id="lucro"
                placeholder="0,00"
              />
            </div>
            <div class="inputsLineDiv">
              <div class="inputsLine"></div>
            </div>
          </form>

          <div class="inputsButtonDiv">
            <button class="btnCalcularActive" id="btnCalcular">
              Calcular<svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-chevron-right-icon lucide-chevron-right"
              >
                <path d="m9 18 6-6-6-6" />
              </svg>
            </button>
            <button id="btnClear">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-rotate-ccw-icon lucide-rotate-ccw"
              >
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
              </svg>
              Limpar
            </button>
          </div>
        </div>

        <div id="divResults" class="col-4 divResults">
          <div id="results">
            <div class="components">
              <div class="moneyFig">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-badge-japanese-yen-icon lucide-badge-japanese-yen"
                >
                  <path
                    d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"
                  />
                  <path d="m9 8 3 3v7" />
                  <path d="m12 11 3-3" />
                  <path d="M9 12h6" />
                  <path d="M9 16h6" />
                </svg>
              </div>
              <div class="textsResults">
                <div class="titleResult"><p>Resultados aparecerão aqui</p></div>
                <div class="descriptionResult">
                  <p>
                    Insira os dados do produto e clique em Calcular para ter os
                    resultados
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
