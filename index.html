<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="render.js"></script>
    <script></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div class="divTitle"><h1 class="title">Calculadora de lucros</h1></div>
    </header>

    <main>
      <div class="row justify-content-evenly">
        <div class="col-4 bg1">
          <div>
            <h1>Dados do Produto</h1>
            <p>
              Preencha os dados do produto para realizar o calulo de valor de
              venda ideal.
            </p>
          </div>

          <form class="row g-3">
            <div class="col-12">
              <label for="nome" class="form-label">Nome do Produto</label>
              <input type="text" class="form-control" id="nome" />
            </div>
            <div class="col-md-6">
              <label for="preco" class="form-label">Preço do Produto</label>
              <input type="text" class="form-control" id="preco" />
            </div>
            <div class="col-md-6">
              <label for="peso" class="form-label">Peso do Produto</label>
              <input type="text" class="form-control" id="peso" />
            </div>
            <div class="col-md-6">
              <label for="taxa" class="form-label">Taxa de importação</label>
              <input type="text" class="form-control" id="taxa" />
            </div>
            <div class="col-md-6">
              <label for="lucro" class="form-label">Lucro Esperado</label>
              <input type="text" class="form-control" id="lucro" />
            </div>
          </form>
          <button id="btnCalcular">Calcular</button>
        </div>

        <div class="col-4 bg2">
          <div id="results">
            <div class="components">
              <div class="moneyFig">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  fill="currentColor"
                  class="bi bi-coin"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M5.5 9.511c.076.954.83 1.697 2.182 1.785V12h.6v-.709c1.4-.098 2.218-.846 2.218-1.932 0-.987-.626-1.496-1.745-1.76l-.473-.112V5.57c.6.068.982.396 1.074.85h1.052c-.076-.919-.864-1.638-2.126-1.716V4h-.6v.719c-1.195.117-2.01.836-2.01 1.853 0 .9.606 1.472 1.613 1.707l.397.098v2.034c-.615-.093-1.022-.43-1.114-.9zm2.177-2.166c-.59-.137-.91-.416-.91-.836 0-.47.345-.822.915-.925v1.76h-.005zm.692 1.193c.717.166 1.048.435 1.048.91 0 .542-.412.914-1.135.982V8.518z"
                  />
                  <path
                    d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"
                  />
                  <path
                    d="M8 13.5a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11m0 .5A6 6 0 1 0 8 2a6 6 0 0 0 0 12"
                  />
                </svg>
              </div>
              <div class="textsResults">
                <div class="titleResult"><p>Resultados aparecerão aqui</p></div>
                <div class="descriptionResult">
                  <p>
                    Insira os dados do produto e clique em Calcular para ter os
                    resultados
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- <div class="col-4 bg2">
          <div class="resultados">
            
        </div> -->
      </div>
    </main>
  </body>
</html>
