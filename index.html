<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="back.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>

    <header>
        <div class="row">
          <div class="col-4">
            <div>
              <h1 class="title">Calculadora de lucros</h1>
            </div>
          </div>
          <div class="col-5"></div>
          <div class="col-3">
            <div>
              <a class="pageLink" href="planilhas/planilhas.html">Planilhas</a>
              <a class="pageLink" href="index.html">Inserção de dados</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="row justify-content-evenly">
        <div class="col-4 bg1">
          <div>
            <h1>Dados do Produto</h1>
          </div>

          <form class="row g-3">            
            <div class="col-12">
              <label for="Nome" class="form-label">Nome do Produto</label>
              <input type="text" class="form-control" id="Nome" placeholder="">
            </div>
            <div class="col-md-6">
              <label for="preco" class="form-label">Preço do Produto</label>
              <input type="text" class="form-control" id="preco">
            </div>
            <div class="col-md-6">
              <label for="peso" class="form-label">Peso do Produto</label>
              <input type="text" class="form-control" id="peso">
            </div>
            <div class="col-md-6">
              <label for="taxa" class="form-label">Taxa de importação</label>
              <input type="text" class="form-control" id="taxa">
            </div>
            <div class="col-md-6">
              <label for="lucro" class="form-label">Lucro Esperado</label>
              <input type="text" class="form-control" id="lucro">
            </div>
          </form>
          <button onclick="calculoGeral()">Calcular</button>
        </div>

        <div class="col-4 bg2">
          <div class="resultados">
            <div class="resultadoValorTotalY">
              <h1>Valor Total em Yuans</h1>
              <p></p>
            </div>
            <div class="resultadoValorTotalRS">
              <h1>Valor Total em Reais</h1>
              <p></p>
            </div>
            <div class="peso">
              <h1>Peso</h1>
              <p></p>
            </div>
            <div class="resultadoValorFrete">
              <h1>Valor debitado</h1>
              <p></p>
            </div>
            <div class="resultadoValorFrete">
              <h1>Valor Venda</h1>
              <p></p>
            </div>
            <div class="resultadoValorFrete">
              <h1>Valor da Taxa de Pagamento</h1>
              <p></p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
